<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>하이탑부동산 | 매물보기</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="listings">
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="index.html">
          <!-- 로고: <img src="images/logo.png" alt="하이탑부동산" class="brand-logo" /> -->
          <span class="brand-text">하이탑부동산</span>
        </a>
        <button class="nav-toggle" aria-label="메뉴 열기">☰</button>
        <nav class="nav-menu" aria-label="매물 카테고리">
          <a href="#" data-category="공장창고">공장·창고</a>
          <a href="#" data-category="상가">상가</a>
          <a href="#" data-category="오피스텔">오피스텔</a>
          <a href="#" data-category="토지">토지</a>
          <a href="#" data-category="힐스테이트더운정">힐스테이트더운정</a>
          <a href="index.html#contact">고객센터</a>
        </nav>
      </div>
    </header>

    <div class="listings-filter-bar">
      <form id="filterForm" class="listing-filter-grid">
        <input type="text" name="keyword" placeholder="검색어 (제목/주소)" />
        <select name="dealType">
          <option value="">거래유형 전체</option>
          <option>매매</option>
          <option>전세</option>
          <option>월세</option>
        </select>
        <select name="propertyType">
          <option value="">매물종류 전체</option>
          <option>공장창고</option>
          <option>상가</option>
          <option>오피스텔</option>
          <option>토지</option>
          <option>힐스테이트더운정</option>
        </select>
        <input type="text" name="region" placeholder="지역" />
        <input type="number" name="maxPrice" placeholder="최대 금액(만원)" min="0" />
        <input type="number" name="minArea" placeholder="최소 면적(㎡)" min="0" />
        <button type="submit" class="btn btn-primary">검색</button>
        <button type="button" id="filterReset" class="btn btn-outline">초기화</button>
      </form>
    </div>

    <div class="listings-body">
      <section class="map-section" aria-label="지도 영역">
        <div id="map">
          <span>지도 영역<br />추후 카카오맵 또는 네이버지도 연동 예정</span>
        </div>
      </section>
      <aside class="listings-panel">
        <div id="listingCards" class="listing-cards"></div>
        <section id="listingDetail" class="listing-detail hidden" aria-live="polite"></section>
      </aside>
    </div>

    <div class="floating-contact">
      <a href="tel:031-949-8969" class="float-btn float-call">전화<br>문의</a>
      <a href="https://blog.naver.com/newpajucity" target="_blank" rel="noopener noreferrer" class="float-btn float-blog">네이버<br>블로그</a>
      <a href="https://open.kakao.com" target="_blank" rel="noopener noreferrer" class="float-btn float-kakao">카카오<br>채팅</a>
    </div>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p class="footer-main">
          <strong>하이탑부동산공인중개사사무소</strong>
          <span>대표: 주현희</span>
          <span>주소: 경기도 파주시 책향기로830, 1층</span>
          <span>전화: 031-949-8969</span>
        </p>
        <p class="footer-sub">
          <span>중개사무소 등록번호: 41480-2016-00026</span>
          <span>사업자등록번호: 305-48-62183</span>
          <span>Copyright © 2026 하이탑부동산. All rights reserved.</span>
        </p>
        <p class="footer-links">
          <a href="https://blog.naver.com/newpajucity" target="_blank" rel="noopener noreferrer">블로그</a>
          <a href="https://cafe.naver.com/pajujjang" target="_blank" rel="noopener noreferrer">카페</a>
          <a href="https://www.youtube.com/@hitop_ai" target="_blank" rel="noopener noreferrer">유튜브</a>
        </p>
      </div>
    </footer>
    <script src="app.js"></script>
  </body>
</html>
