<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>하이탑부동산 | 매물 관리</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="admin-listings">
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="index.html">
          <span class="brand-text">하이탑부동산</span>
        </a>
        <button class="nav-toggle" aria-label="메뉴 열기">☰</button>
        <nav class="nav-menu">
          <a href="index.html">홈</a>
          <a href="listings.html">매물보기</a>
          <a href="admin.html">대시보드</a>
          <a href="admin-register.html">매물등록</a>
          <a href="admin-listings.html" aria-current="page">매물관리</a>
          <a href="https://hitoputube-creator.github.io/hitop-ai-workcenter/index.html" target="_blank" rel="noopener noreferrer">업무센터</a>
          <button class="btn btn-outline" id="logoutBtn" type="button" style="font-size:0.85rem;padding:6px 12px;display:none;">로그아웃</button>
        </nav>
      </div>
    </header>

    <div id="loginOverlay" class="login-overlay">
      <div class="login-box">
        <h2>관리자 로그인</h2>
        <input type="password" id="loginPw" placeholder="비밀번호 입력" autocomplete="current-password" />
        <p id="loginError" class="login-error hidden">비밀번호가 올바르지 않습니다.</p>
        <button class="btn btn-primary" id="loginBtn" type="button">로그인</button>
      </div>
    </div>

    <main class="section hidden" id="adminMain">
      <div class="container">

        <div class="admin-page-header">
          <a href="admin.html" class="btn btn-outline">← 대시보드</a>
          <h1>매물 관리</h1>
          <a href="admin-register.html" class="btn btn-primary">+ 매물 등록</a>
        </div>

        <!-- 검색 · 필터 -->
        <div class="admin-filters">
          <input type="text" id="searchInput" placeholder="제목 / 주소 검색" />
          <select id="filterCategory">
            <option value="">전체 종류</option>
            <option>공장창고</option>
            <option>상가</option>
            <option>오피스텔</option>
            <option>토지</option>
            <option>힐스테이트더운정</option>
            <option>단독주택</option>
          </select>
          <select id="filterDealType">
            <option value="">전체 거래유형</option>
            <option>매매</option>
            <option>전세</option>
            <option>월세</option>
          </select>
          <select id="filterStatus">
            <option value="">전체 상태</option>
            <option value="public">공개중</option>
            <option value="done">거래완료</option>
          </select>
        </div>

        <!-- 정렬 · 카운트 -->
        <div class="sort-row">
          <button class="btn btn-outline active" id="sortDate" type="button">최신순</button>
          <button class="btn btn-outline" id="sortPrice" type="button">가격순</button>
          <span id="totalCount" class="total-count"></span>
        </div>

        <!-- 매물 목록 -->
        <div id="adminListings" class="admin-list"></div>

        <!-- 페이지네이션 -->
        <div id="pagination" class="pagination"></div>

      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p class="footer-main">
          <strong>하이탑부동산공인중개사사무소</strong>
          <span>대표: 주현희</span>
          <span>주소: 경기도 파주시 책향기로830, 1층</span>
          <span>전화: 031-949-8969</span>
          <a href="admin.html" style="margin-left:auto; padding:4px 10px; background:#333; color:#fff; border-radius:4px; font-size:11px; text-decoration:none; opacity:0.6;">관리자</a>
        </p>
        <p class="footer-sub">
          <span>중개사무소 등록번호: 41480-2016-00026</span>
          <span>사업자등록번호: 305-48-62183</span>
          <span>Copyright © 2026 하이탑부동산. All rights reserved.</span>
        </p>
        <p class="footer-links">
          <a href="https://blog.naver.com/newpajucity" target="_blank" rel="noopener noreferrer">블로그</a>
          <a href="https://cafe.naver.com/pajujjang" target="_blank" rel="noopener noreferrer">카페</a>
          <a href="https://www.youtube.com/@hitop_ai" target="_blank" rel="noopener noreferrer">유튜브</a>
        </p>
      </div>
    </footer>
    <script src="app.js?v=20260520"></script>
  </body>
</html>
