name: Build listing pages

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'
  push:
    branches:
      - main
    paths:
      - 'app.js'
      - 'listing-detail.html'
      - 'style.css'
      - 'scripts/build-listing-pages.mjs'
      - '.github/workflows/build-listing-pages.yml'

permissions:
  contents: write

concurrency:
  group: build-listing-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate listing pages and sitemap
        run: node scripts/build-listing-pages.mjs

      - name: Commit generated pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add listing sitemap.xml
          if git diff --cached --quiet; then
            echo "No generated changes."
          else
            git commit -m "Build listing pages"
            git push
          fi
