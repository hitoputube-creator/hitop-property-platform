      .consult-mgmt-table {

      }
      .consult-mgmt-table thead tr { background: #f6f8fb; border-bottom: 2px solid #e2e6ed; }
      .consult-mgmt-table th {

      }
      .consult-mgmt-table td {

        border-bottom: 1px solid #f0f2f6; vertical-align: middle;
      }
      .consult-mgmt-table tbody tr:last-child td { border-bottom: none; }
      .consult-mgmt-table tbody tr:hover { background: #f9fafb; }
      .consult-mgmt-table td.td-title {
        text-align: left; max-width: 240px;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .consult-mgmt-table td.td-listing {
        max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .consult-type-badge {
        display: inline-block; padding: 2px 7px;
        border-radius: 4px; font-size: 11px; font-weight: 600;
        background: #eef1f8; color: #0A1F5C;
      }
      .consult-status-badge {
        display: inline-block; padding: 3px 9px;
        border-radius: 20px; font-size: 11px; font-weight: 700;
      }
      .cs-접수완료 { background: #e8f0fe; color: #1a56c4; }
      .cs-상담중   { background: #fff3e0; color: #c07000; }

      .consult-empty { padding: 48px; text-align: center; color: #aaa; font-size: 14px; }

      .page-header {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 20px; gap: 12px;
      }
      .page-title { font-size: 22px; font-weight: 700; color: #0A1F5C; margin: 0; }
      .page-count { font-size: 13px; color: #888; }

      @media (max-width: 640px) {
        .page-title { font-size: 18px; }
      }

    <script src="app.js?v=20260522a"></script>
    <script type="module">
      import { db, COLLECTION } from "./firebase-config.js";
      import { collection, getDocs, query, orderBy, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      function statusClass(s) {
        if (s === '접수완료') return 'cs-접수완료';
        if (s === '상담중')   return 'cs-상담중';
        return 'cs-답변완료';
      }
      function formatDate(ts) {
        if (!ts) return '—';
        try {
          const d = ts.toDate();
          return d.getFullYear() + '.' +
            String(d.getMonth() + 1).padStart(2, '0') + '.' +
            String(d.getDate()).padStart(2, '0');
        } catch { return '—'; }
      }

      const tbody = document.getElementById('consultAdminTbody');
      const countEl = document.getElementById('consultCount');

      (async () => {
        try {
          const q = query(collection(db, COLLECTION), orderBy('createdAt', 'desc'));
          const snap = await getDocs(q);
          const docs = snap.docs;

          if (countEl) countEl.textContent = '총 ' + docs.length + '건';

          if (!docs.length) {
            tbody.innerHTML = '<tr><td colspan="9" class="consult-empty">등록된 상담문의가 없습니다.</td></tr>';
            return;
          }

          tbody.innerHTML = '';
          docs.forEach((docSnap, i) => {
            const post  = docSnap.data();
            const docId = docSnap.id;
            const tr    = document.createElement('tr');

            tr.innerHTML =
              '<td>' + (docs.length - i) + '</td>' +
              '<td><span class="consult-type-badge">' + post.type + '</span></td>' +
              '<td class="td-title">' + post.subject + '</td>' +
              '<td>' + post.name + '</td>' +
              '<td>' + post.phone + '</td>' +
              '<td class="td-listing">' + (post.listing || '—') + '</td>' +
              '<td>' + formatDate(post.createdAt) + '</td>' +
              '<td><span class="consult-status-badge ' + statusClass(post.status) + '">' + post.status + '</span></td>';

            const tdMgmt = document.createElement('td');
            const select = document.createElement('select');
            select.style.cssText = 'font-family:inherit;font-size:12px;padding:3px 6px;border:1px solid #dde2ea;border-radius:4px;cursor:pointer;';
            ['접수완료', '상담중', '답변완료'].forEach(opt => {
              const o = document.createElement('option');
              o.value = opt; o.textContent = opt;
              if (opt === post.status) o.selected = true;
              select.appendChild(o);
            });

            const msg = document.createElement('span');
            msg.style.cssText = 'margin-left:6px;font-size:11px;color:#1a7a42;display:none;';
            msg.textContent = '저장됨';

            select.addEventListener('change', async () => {
              const prev      = post.status;
              const newStatus = select.value;
              try {
                await updateDoc(doc(db, COLLECTION, docId), { status: newStatus });
                post.status = newStatus;
                msg.style.display = 'inline';
                setTimeout(() => { msg.style.display = 'none'; }, 2000);
              } catch (err) {
                console.error('상태 변경 오류:', err);
                alert('상태 변경 중 오류가 발생했습니다.');
                select.value = prev;
              }
            });

            tdMgmt.appendChild(select);
            tdMgmt.appendChild(msg);
            tr.appendChild(tdMgmt);
            tbody.appendChild(tr);
          });
        } catch (err) {
          console.error('Firestore 상담문의 조회 오류:', err);
          tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:24px;color:#e53e3e;">상담문의 목록을 불러오지 못했습니다.</td></tr>';
        }
      })();
    </script>
