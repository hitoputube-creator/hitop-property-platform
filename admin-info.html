<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>하이탑부동산 | 부동산정보 관리</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── 레이아웃 ── */
    .ai-section { background:#f2f4f7; padding:40px 0 64px; min-height:calc(100vh - 180px); }
    .ai-header  { display:flex; align-items:center; justify-content:space-between;
                  margin-bottom:20px; gap:12px; flex-wrap:wrap; }
    .ai-title   { font-size:22px; font-weight:800; color:#0A1F5C; margin:0; }

    /* ── 필터 바 ── */
    .ai-filter  { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
    .ai-filter select, .ai-filter input {
      padding:7px 10px; border:1.5px solid #e2e6ed; border-radius:7px;
      font-size:13px; background:#fff; font-family:inherit; }
    .ai-filter-btn { padding:7px 14px; border-radius:7px; font-size:13px;
                     font-weight:700; cursor:pointer; border:none; font-family:inherit; }
    .ai-filter-btn-primary { background:#0A1F5C; color:#fff; }
    .ai-filter-btn-reset   { background:#e5e7eb; color:#374151; }

    /* ── 테이블 ── */
    .ai-card       { background:#fff; border-radius:12px; border:1px solid #e2e6ed;
                     box-shadow:0 2px 12px rgba(10,31,92,0.05); overflow:hidden; }
    .ai-table-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .ai-table      { width:100%; border-collapse:collapse; font-size:13px; min-width:760px; }
    .ai-table thead tr { background:#f6f8fb; border-bottom:2px solid #e2e6ed; }
    .ai-table th { padding:11px 12px; font-size:11px; font-weight:700; color:#888;
                   text-align:center; white-space:nowrap; }
    .ai-table th.col-title { text-align:left; }
    .ai-table td { padding:11px 12px; text-align:center; color:#374151;
                   border-bottom:1px solid #f0f2f6; vertical-align:middle; }
    .ai-table td.col-title { text-align:left; font-weight:600; max-width:260px;
                              white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .ai-table tbody tr:last-child td { border-bottom:none; }
    .ai-table tbody tr:hover { background:#f9fafb; }
    .ai-empty { padding:40px; text-align:center; color:#9ca3af; font-size:14px; }

    /* ── 뱃지 ── */
    .pub-badge  { display:inline-block; padding:2px 9px; border-radius:20px;
                  font-size:11px; font-weight:700; }
    .pub-on  { background:#dcfce7; color:#166534; }
    .pub-off { background:#e5e7eb; color:#4b5563; }

    .cat-badge { display:inline-block; padding:2px 8px; border-radius:4px;
                 font-size:11px; font-weight:600; background:#e0f2fe; color:#0369a1; }

    /* ── 버튼 ── */
    .ai-btn { font-size:12px; padding:4px 10px; border-radius:6px;
              cursor:pointer; font-weight:700; border:none; font-family:inherit; }
    .ai-btn-edit   { background:#e0f2fe; color:#0369a1; }
    .ai-btn-del    { background:#fee2e2; color:#b91c1c; }
    .ai-btn-pub    { background:#dcfce7; color:#166534; }
    .ai-btn-unpub  { background:#fef9c3; color:#92400e; }
    .ai-btn:hover  { filter:brightness(.93); }

    /* ── 모달 오버레이 ── */
    .ai-modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45);
                        z-index:300; overflow-y:auto; padding:32px 12px; }
    .ai-modal-overlay.open { display:block; }
    .ai-modal-box  { background:#fff; border-radius:16px; max-width:720px;
                     margin:0 auto; padding:0; overflow:hidden;
                     box-shadow:0 8px 40px rgba(0,0,0,.2); }
    .ai-modal-hd   { display:flex; align-items:center; justify-content:space-between;
                     padding:18px 24px; border-bottom:1px solid #e2e6ed;
                     background:#0A1F5C; color:#fff; }
    .ai-modal-hd h2 { margin:0; font-size:17px; font-weight:700; }
    .ai-modal-close { background:none; border:none; color:#fff; font-size:22px;
                      cursor:pointer; line-height:1; padding:0; }
    .ai-modal-body { padding:24px; overflow-y:auto; max-height:calc(100vh - 160px); }

    /* ── 폼 ── */
    .ai-field { margin-bottom:16px; }
    .ai-field label { display:block; font-size:12px; font-weight:700; color:#64748b;
                      margin-bottom:5px; }
    .ai-field input, .ai-field select, .ai-field textarea {
      width:100%; padding:9px 12px; border:1.5px solid #e2e6ed; border-radius:8px;
      font-size:14px; font-family:inherit; background:#fff; box-sizing:border-box;
      transition:border-color .15s; }
    .ai-field input:focus, .ai-field select:focus, .ai-field textarea:focus {
      outline:none; border-color:#0A1F5C; }
    .ai-field textarea { resize:vertical; min-height:180px; line-height:1.7; }
    .ai-field-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .ai-field-hint { font-size:11px; color:#9ca3af; margin-top:4px; }
    .ai-form-actions { display:flex; gap:10px; margin-top:20px; }
    .ai-form-actions button { flex:1; padding:12px; border-radius:10px;
                               font-size:14px; font-weight:700; cursor:pointer;
                               font-family:inherit; border:none; }
    .ai-save-btn   { background:#0A1F5C; color:#fff; }
    .ai-cancel-btn { background:#e5e7eb; color:#374151; }

    /* ── 공개 토글 체크박스 스타일 ── */
    .ai-toggle-wrap { display:flex; align-items:center; gap:10px; }
    .ai-toggle-wrap input[type=checkbox] { width:18px; height:18px; cursor:pointer; }

    @media (max-width:640px) {
      .ai-field-row { grid-template-columns:1fr; }
      .ai-header { flex-direction:column; align-items:flex-start; }
    }
  </style>
</head>
<body data-page="admin-info">

  <!-- 헤더 -->
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">
        <img src="images/hitoplogo.png" alt="하이탑부동산" class="brand-logo" />
      </a>
      <button class="nav-toggle" aria-label="메뉴 열기">☰</button>
      <nav class="nav-menu">
        <a href="index.html">홈</a>
        <a href="listings.html">매물보기</a>
        <a href="admin.html">대시보드</a>
        <a href="admin-contact.html">상담신청관리</a>
        <a href="admin-consults.html">상담게시판관리</a>
        <a href="admin-register.html">매물등록</a>
        <a href="admin-info.html" aria-current="page">부동산정보관리</a>
        <button class="btn btn-outline" id="logoutBtn" type="button"
                style="font-size:0.85rem;padding:6px 12px;display:none;">로그아웃</button>
      </nav>
    </div>
  </header>

  <!-- 로그인 오버레이 (기존 방식과 동일) -->
  <div id="loginOverlay" class="login-overlay">
    <div class="login-box">
      <h2>관리자 로그인</h2>
      <input type="password" id="loginPw" placeholder="비밀번호 입력" autocomplete="current-password" />
      <p id="loginError" class="login-error hidden">비밀번호가 올바르지 않습니다.</p>
      <button class="btn btn-primary" id="loginBtn" type="button">로그인</button>
    </div>
  </div>

  <!-- 본문 (로그인 후 표시) -->
  <main class="ai-section hidden" id="adminMain">
    <div class="container">

      <div class="ai-header">
        <div>
          <a href="admin.html" class="btn btn-outline" style="margin-bottom:8px;">← 대시보드</a>
          <h1 class="ai-title">부동산정보 관리</h1>
        </div>
        <button class="btn btn-primary" id="btnNewPost" type="button">+ 새 글 작성</button>
      </div>

      <!-- 필터 -->
      <div class="ai-filter">
        <select id="filterCat">
          <option value="">전체 카테고리</option>
          <option value="공장·창고">공장·창고</option>
          <option value="상가·사무실">상가·사무실</option>
          <option value="토지">토지</option>
          <option value="오피스텔">오피스텔</option>
          <option value="계약·권리금">계약·권리금</option>
          <option value="지역분석">지역분석</option>
        </select>
        <select id="filterPub">
          <option value="">공개/비공개 전체</option>
          <option value="true">공개</option>
          <option value="false">비공개</option>
        </select>
        <button class="ai-filter-btn ai-filter-btn-primary" id="btnFilter">검색</button>
        <button class="ai-filter-btn ai-filter-btn-reset"   id="btnReset">초기화</button>
      </div>

      <!-- 목록 카드 -->
      <div class="ai-card">
        <div class="ai-table-wrap">
          <table class="ai-table">
            <thead>
              <tr>
                <th style="width:36px;">#</th>
                <th class="col-title">제목</th>
                <th>카테고리</th>
                <th>공개</th>
                <th>작성일</th>
                <th>수정일</th>
                <th style="min-width:160px;">작업</th>
              </tr>
            </thead>
            <tbody id="infoTbody">
              <tr><td colspan="7" class="ai-empty">불러오는 중…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
      <p id="listCount" style="font-size:13px;color:#9ca3af;margin-top:10px;"></p>

    </div>
  </main>

  <!-- 글 작성/수정 모달 -->
  <div class="ai-modal-overlay" id="postModal" role="dialog" aria-modal="true">
    <div class="ai-modal-box">
      <div class="ai-modal-hd">
        <h2 id="modalTitle">새 글 작성</h2>
        <button class="ai-modal-close" id="modalClose" aria-label="닫기">✕</button>
      </div>
      <div class="ai-modal-body">
        <form id="postForm" novalidate>
          <input type="hidden" id="editId" />

          <div class="ai-field">
            <label>제목 <span style="color:#dc2626">*</span></label>
            <input type="text" id="fTitle" placeholder="글 제목을 입력하세요" required />
          </div>

          <div class="ai-field-row">
            <div class="ai-field">
              <label>카테고리 <span style="color:#dc2626">*</span></label>
              <select id="fCategory">
                <option value="공장·창고">공장·창고</option>
                <option value="상가·사무실">상가·사무실</option>
                <option value="토지">토지</option>
                <option value="오피스텔">오피스텔</option>
                <option value="계약·권리금">계약·권리금</option>
                <option value="지역분석">지역분석</option>
              </select>
            </div>
            <div class="ai-field">
              <label>Slug (URL용 고유 코드)</label>
              <input type="text" id="fSlug" placeholder="자동생성 또는 직접 입력" />
              <p class="ai-field-hint">비워두면 날짜+랜덤코드로 자동 생성됩니다.</p>
            </div>
          </div>

          <div class="ai-field">
            <label>요약문 <span style="color:#dc2626">*</span></label>
            <input type="text" id="fSummary" placeholder="한 줄 요약 (목록 카드에 표시됩니다)" required />
          </div>

          <div class="ai-field">
            <label>본문 <span style="color:#dc2626">*</span></label>
            <textarea id="fContent" placeholder="본문을 입력하세요. 줄바꿈은 자동으로 처리됩니다." required></textarea>
          </div>

          <div class="ai-field-row">
            <div class="ai-field">
              <label>검색 키워드</label>
              <input type="text" id="fKeywords" placeholder="쉼표로 구분 (예: 파주,공장,임대)" />
            </div>
            <div class="ai-field">
              <label>대표 이미지 URL</label>
              <input type="url" id="fCoverImage" placeholder="https://..." />
            </div>
          </div>

          <div class="ai-field">
            <label>SEO 제목</label>
            <input type="text" id="fSeoTitle" placeholder="비워두면 글 제목이 사용됩니다" />
          </div>

          <div class="ai-field">
            <label>SEO 설명문</label>
            <input type="text" id="fSeoDescription" placeholder="비워두면 요약문이 사용됩니다" />
          </div>

          <div class="ai-field">
            <label>공개 여부</label>
            <div class="ai-toggle-wrap">
              <input type="checkbox" id="fPublished" />
              <span id="pubLabel" style="font-size:13px;font-weight:700;color:#0A1F5C;">비공개</span>
            </div>
          </div>

          <div class="ai-form-actions">
            <button type="submit" class="ai-save-btn">저장</button>
            <button type="button" class="ai-cancel-btn" id="formCancel">취소</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- app.js: 로그인 로직 재사용 -->
  <script src="app.js"></script>

  <script type="module">
    import { supabase } from './supabase-config.js';

    /* ── 유틸 ── */
    const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const $  = id => document.getElementById(id);

    function fmtDate(d) {
      if (!d) return '—';
      const dt = new Date(d);
      const p  = n => String(n).padStart(2,'0');
      return `${dt.getFullYear()}.${p(dt.getMonth()+1)}.${p(dt.getDate())}`;
    }

    function genSlug() {
      const now = new Date();
      const p = n => String(n).padStart(2,'0');
      const rand = Math.random().toString(36).slice(2,5).toUpperCase();
      return `info-${now.getFullYear()}${p(now.getMonth()+1)}${p(now.getDate())}-${rand}`;
    }

    /* ── 목록 로드 ── */
    let _all = [];

    async function loadList() {
      const tbody = $('infoTbody');
      tbody.innerHTML = '<tr><td colspan="7" class="ai-empty">불러오는 중…</td></tr>';

      const { data, error } = await supabase
        .from('property_infos')
        .select('id,slug,title,category,is_published,created_at,updated_at')
        .order('created_at', { ascending: false });

      if (error) {
        tbody.innerHTML = `<tr><td colspan="7" class="ai-empty" style="color:#dc2626;">로드 실패: ${esc(error.message)}</td></tr>`;
        return;
      }
      _all = data || [];
      applyFilter();
    }

    function applyFilter() {
      const cat = $('filterCat').value;
      const pub = $('filterPub').value;
      let rows = _all;
      if (cat) rows = rows.filter(r => r.category === cat);
      if (pub !== '') rows = rows.filter(r => String(r.is_published) === pub);
      renderTable(rows);
    }

    function renderTable(rows) {
      const tbody = $('infoTbody');
      $('listCount').textContent = `총 ${rows.length}건`;
      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="ai-empty">등록된 글이 없습니다.</td></tr>';
        return;
      }
      tbody.innerHTML = rows.map((r, i) => `
        <tr data-id="${esc(r.id)}">
          <td style="color:#9ca3af;font-size:12px;">${rows.length - i}</td>
          <td class="col-title" title="${esc(r.title)}">${esc(r.title)}</td>
          <td><span class="cat-badge">${esc(r.category)}</span></td>
          <td>
            <span class="pub-badge ${r.is_published ? 'pub-on' : 'pub-off'}">
              ${r.is_published ? '공개' : '비공개'}
            </span>
          </td>
          <td style="font-size:12px;">${fmtDate(r.created_at)}</td>
          <td style="font-size:12px;">${fmtDate(r.updated_at)}</td>
          <td style="display:flex;gap:4px;justify-content:center;flex-wrap:wrap;">
            <button class="ai-btn ai-btn-edit"  onclick="window._aiEdit('${esc(r.id)}')">수정</button>
            <button class="ai-btn ${r.is_published ? 'ai-btn-unpub' : 'ai-btn-pub'}"
                    onclick="window._aiTogglePub('${esc(r.id)}',${!r.is_published})">
              ${r.is_published ? '비공개로' : '공개로'}
            </button>
            <button class="ai-btn ai-btn-del"   onclick="window._aiDelete('${esc(r.id)}')">삭제</button>
          </td>
        </tr>`).join('');
    }

    /* ── 공개/비공개 토글 ── */
    window._aiTogglePub = async (id, newVal) => {
      const { error } = await supabase
        .from('property_infos')
        .update({ is_published: newVal })
        .eq('id', id);
      if (error) { alert('변경 실패: ' + error.message); return; }
      await loadList();
    };

    /* ── 삭제 ── */
    window._aiDelete = async (id) => {
      if (!confirm('정말 이 글을 삭제하시겠습니까?\n삭제 후 복구할 수 없습니다.')) return;
      const { error } = await supabase.from('property_infos').delete().eq('id', id);
      if (error) { alert('삭제 실패: ' + error.message); return; }
      await loadList();
    };

    /* ── 모달 열기/닫기 ── */
    const modal = $('postModal');

    function openModal(data = null) {
      $('editId').value        = data?.id        ?? '';
      $('fTitle').value        = data?.title      ?? '';
      $('fCategory').value     = data?.category   ?? '공장·창고';
      $('fSlug').value         = data?.slug       ?? '';
      $('fSummary').value      = data?.summary    ?? '';
      $('fContent').value      = data?.content    ?? '';
      $('fKeywords').value     = data?.keywords   ?? '';
      $('fCoverImage').value   = data?.cover_image ?? '';
      $('fSeoTitle').value     = data?.seo_title   ?? '';
      $('fSeoDescription').value = data?.seo_description ?? '';
      $('fPublished').checked  = data?.is_published ?? false;
      $('pubLabel').textContent = data?.is_published ? '공개' : '비공개';
      $('modalTitle').textContent = data ? '글 수정' : '새 글 작성';
      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
      $('fTitle').focus();
    }

    function closeModal() {
      modal.classList.remove('open');
      document.body.style.overflow = '';
      $('postForm').reset();
      $('editId').value = '';
    }

    $('btnNewPost').addEventListener('click', () => openModal());
    $('modalClose').addEventListener('click', closeModal);
    $('formCancel').addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    $('fPublished').addEventListener('change', function() {
      $('pubLabel').textContent = this.checked ? '공개' : '비공개';
    });

    /* ── 수정 버튼 → 상세 조회 후 폼 채우기 ── */
    window._aiEdit = async (id) => {
      const { data, error } = await supabase
        .from('property_infos').select('*').eq('id', id).single();
      if (error) { alert('조회 실패: ' + error.message); return; }
      openModal(data);
    };

    /* ── 폼 저장 ── */
    $('postForm').addEventListener('submit', async e => {
      e.preventDefault();

      const id      = $('editId').value.trim();
      const title   = $('fTitle').value.trim();
      const summary = $('fSummary').value.trim();
      const content = $('fContent').value.trim();
      if (!title || !summary || !content) {
        alert('제목, 요약, 본문은 필수 입력 항목입니다.');
        return;
      }

      const slug = $('fSlug').value.trim() || genSlug();

      const payload = {
        slug,
        title,
        category:        $('fCategory').value,
        summary,
        content,
        keywords:        $('fKeywords').value.trim(),
        seo_title:       $('fSeoTitle').value.trim(),
        seo_description: $('fSeoDescription').value.trim(),
        cover_image:     $('fCoverImage').value.trim() || null,
        is_published:    $('fPublished').checked,
      };

      let error;
      if (id) {
        ({ error } = await supabase.from('property_infos').update(payload).eq('id', id));
      } else {
        ({ error } = await supabase.from('property_infos').insert(payload));
      }

      if (error) {
        alert('저장 실패: ' + error.message);
        return;
      }

      closeModal();
      await loadList();
    });

    /* ── 필터 ── */
    $('btnFilter').addEventListener('click', applyFilter);
    $('btnReset').addEventListener('click', () => {
      $('filterCat').value = '';
      $('filterPub').value = '';
      applyFilter();
    });

    /* ── 관리자 인증 완료 후 목록 로드 ── */
    // app.js 의 로그인 처리가 adminMain.classList.remove('hidden') 를 수행하면
    // MutationObserver 로 감지해서 로드합니다.
    new MutationObserver((mutations) => {
      for (const m of mutations) {
        if (m.type === 'attributes' && m.attributeName === 'class') {
          const el = m.target;
          if (!el.classList.contains('hidden')) {
            loadList();
          }
        }
      }
    }).observe($('adminMain'), { attributes: true });

    // 이미 로그인 상태일 경우 (sessionStorage)
    if (sessionStorage.getItem('hitopAdminLoggedIn') === 'true') {
      loadList();
    }
  </script>
</body>
</html>
