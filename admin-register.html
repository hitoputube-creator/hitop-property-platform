<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>하이탑부동산 | 매물 등록</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="admin-register">
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="index.html">
          <span class="brand-text">하이탑부동산</span>
        </a>
        <button class="nav-toggle" aria-label="메뉴 열기">☰</button>
        <nav class="nav-menu">
          <a href="index.html">홈</a>
          <a href="listings.html">매물보기</a>
          <a href="admin.html">대시보드</a>
          <a href="admin-register.html" aria-current="page">매물등록</a>
          <a href="admin-listings.html">매물관리</a>
          <button class="btn btn-outline" id="logoutBtn" type="button" style="font-size:0.85rem;padding:6px 12px;display:none;">로그아웃</button>
        </nav>
      </div>
    </header>

    <div id="loginOverlay" class="login-overlay">
      <div class="login-box">
        <h2>관리자 로그인</h2>
        <input type="password" id="loginPw" placeholder="비밀번호 입력" autocomplete="current-password" />
        <p id="loginError" class="login-error hidden">비밀번호가 올바르지 않습니다.</p>
        <button class="btn btn-primary" id="loginBtn" type="button">로그인</button>
      </div>
    </div>

    <main class="section hidden" id="adminMain">
      <div class="container" style="max-width:640px;">

        <div class="admin-page-header">
          <a href="admin.html" class="btn btn-outline">← 대시보드</a>
          <h1 id="formTitle">매물 등록</h1>
        </div>

        <div class="listing-no-display">
          매물번호: <strong id="listingNoDisplay">-</strong>
          <span style="font-size:11px;color:var(--gray-700);margin-left:8px;">매물종류 선택 시 자동 부여됩니다</span>
        </div>

        <form id="adminForm" class="admin-form">
          <input type="hidden" name="id" />
          <input type="hidden" name="listingNo" />
          <input type="hidden" name="createdAt" />

          <select name="propertyType" required>
            <option value="">매물종류 선택</option>
            <option>공장창고</option>
            <option>상가</option>
            <option>오피스텔</option>
            <option>토지</option>
            <option>힐스테이트더운정</option>
            <option>단독주택</option>
          </select>

          <select name="dealType" required>
            <option value="">거래유형 선택</option>
            <option>매매</option>
            <option>전세</option>
            <option>월세</option>
          </select>

          <input name="address" placeholder="정확한 주소 (지도 마커용 — 비공개)" required />
          <input name="displayAddress" placeholder="표시용 주소 (예: 파주시 탄현면)" required />

          <div class="area-row">
            <input type="number" name="area" min="0" step="0.1" placeholder="면적(㎡)" required />
            <span class="area-pyeong" id="areaPyeong"></span>
          </div>

          <div class="price-row">
            <input type="number" name="price" min="0" placeholder="가격(만원)" required />
            <span class="price-korean" id="priceKorean"></span>
          </div>

          <input name="title" placeholder="제목" required />
          <textarea name="description" rows="4" placeholder="설명" required></textarea>

          <div id="imageUrlContainer"></div>
          <button type="button" id="addImageBtn" class="btn btn-outline" style="font-size:0.85rem;">사진 추가 +</button>

          <div style="display:flex;gap:10px;margin-top:8px;">
            <button type="submit" class="btn btn-primary" style="flex:1;">저장</button>
            <button type="button" id="cancelEditBtn" class="btn btn-outline hidden">수정 취소</button>
          </div>
        </form>

      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p class="footer-main">
          <strong>하이탑부동산공인중개사사무소</strong>
          <span>대표: 주현희</span>
          <span>주소: 경기도 파주시 책향기로830, 1층</span>
          <span>전화: 031-949-8969</span>
          <a href="admin.html" style="margin-left:auto; padding:4px 10px; background:#333; color:#fff; border-radius:4px; font-size:11px; text-decoration:none; opacity:0.6;">관리자</a>
        </p>
        <p class="footer-sub">
          <span>중개사무소 등록번호: 41480-2016-00026</span>
          <span>사업자등록번호: 305-48-62183</span>
          <span>Copyright © 2026 하이탑부동산. All rights reserved.</span>
        </p>
        <p class="footer-links">
          <a href="https://blog.naver.com/newpajucity" target="_blank" rel="noopener noreferrer">블로그</a>
          <a href="https://cafe.naver.com/pajujjang" target="_blank" rel="noopener noreferrer">카페</a>
          <a href="https://www.youtube.com/@hitop_ai" target="_blank" rel="noopener noreferrer">유튜브</a>
        </p>
      </div>
    </footer>
    <script src="app.js?v=20260520"></script>
  </body>
</html>
