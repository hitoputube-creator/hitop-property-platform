<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>하이탑부동산 | 관리자</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  <style>
    @media (max-width: 480px) {
      .dash-actions { flex-direction: column; width: 100%; }
      .dash-actions .btn { width: 100%; text-align: center; }
    }
  </style>
  </head>
  <body data-page="admin-dashboard">
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="index.html">
          <img src="images/hitoplogo.png" alt="" class="brand-logo" />
        </a>
        <button class="nav-toggle" aria-label="메뉴 열기">☰</button>
        <nav class="nav-menu">
          <a href="index.html">홈</a>
          <a href="listings.html">매물보기</a>
          <a href="admin.html" aria-current="page">관리자</a>
          <a href="admin-consults.html">상담문의관리</a>
          <a href="admin-register.html">매물등록</a>
          <a href="https://hitoputube-creator.github.io/hitop-ai-workcenter/index.html" target="_blank" rel="noopener noreferrer">업무센터</a>
          <button class="btn btn-outline" id="logoutBtn" type="button" style="font-size:0.85rem;padding:6px 12px;display:none;">로그아웃</button>
        </nav>
      </div>
    </header>

    <div id="loginOverlay" class="login-overlay">
      <div class="login-box">
        <h2>관리자 로그인</h2>
        <input type="password" id="loginPw" placeholder="비밀번호 입력" autocomplete="current-password" />
        <p id="loginError" class="login-error hidden">비밀번호가 올바르지 않습니다.</p>
        <button class="btn btn-primary" id="loginBtn" type="button">로그인</button>
      </div>
    </div>

    <main class="section hidden" id="adminMain">
      <div class="container">

        <div class="dash-header">
          <h1 class="dash-title">관리자 대시보드</h1>
          <div class="dash-actions" style="display:flex;gap:8px;flex-wrap:wrap;">
            <a href="admin-consults.html" class="btn btn-outline">📋 상담문의 관리</a>
            <a href="admin-register.html" class="btn btn-primary">+ 매물 등록하기</a>
          </div>
        </div>

        <!-- 통계 카드 4개 -->
        <div class="dash-stats adm-stats-4">
          <div class="stat-card stat-gold">
            <div class="stat-num" id="statTotal">-</div>
            <div class="stat-label">전체 매물</div>
          </div>
          <div class="stat-card stat-green">
            <div class="stat-num" id="statPublic">-</div>
            <div class="stat-label">공개중</div>
          </div>
          <div class="stat-card stat-red">
            <div class="stat-num" id="statDone">-</div>
            <div class="stat-label">거래완료</div>
          </div>
          <div class="stat-card stat-star">
            <div class="stat-num" id="statRecommended">-</div>
            <div class="stat-label">추천매물</div>
          </div>
        </div>

        <!-- 검색/필터 바 -->
        <div class="adm-filter-bar">
          <select id="adminFilterCat">
            <option value="">전체 종류</option>
            <option value="공장창고">공장·창고</option>
            <option value="상가">상가·빌딩</option>
            <option value="토지">토지·개발</option>
            <option value="오피스텔">오피스텔</option>
            <option value="힐스테이트더운정">힐스테이트더운정</option>
            <option value="단독주택">단독·전원주택</option>
          </select>
          <select id="adminFilterDeal">
            <option value="">거래유형 전체</option>
            <option value="매매">매매</option>
            <option value="임대">임대</option>
            <option value="전세">전세</option>
          </select>
          <input type="text" id="adminSearchKw" placeholder="매물명 / 위치 검색" />
          <button type="button" class="btn btn-primary adm-filter-btn" id="adminSearchBtn">검색</button>
          <button type="button" class="btn btn-outline adm-filter-btn" id="adminResetBtn">초기화</button>
        </div>

        <!-- 정렬 + 카운트 -->
        <div class="sort-row">
          <button class="btn btn-outline active" id="adminSortDate" type="button">최신순</button>
          <button class="btn btn-outline" id="adminSortPrice" type="button">가격순</button>
          <span id="adminTotalCount" class="total-count"></span>
        </div>

        <!-- 매물 목록 -->
        <div id="adminListWrap" class="adm-list"></div>


      </div>
    </main>

    <!-- 수정 모달 -->
    <div id="editModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-label="매물 수정">
      <div class="modal-box adm-edit-modal">
        <div class="modal-header">
          <span style="font-weight:700;color:#0A1F5C;">매물 수정</span>
          <button class="modal-close" id="editModalClose" type="button" aria-label="닫기">✕</button>
        </div>
        <div style="overflow-y:auto;flex:1;padding:20px;">
          <form id="editForm" class="admin-form">
            <input type="hidden" id="editId" />
            <div>
              <label style="font-size:12px;color:#666;display:block;margin-bottom:4px;">매물명</label>
              <input type="text" id="editTitle" placeholder="매물명" required />
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
              <div>
                <label style="font-size:12px;color:#666;display:block;margin-bottom:4px;">매물종류</label>
                <select id="editType">
                  <option value="공장창고">공장창고</option>
                  <option value="상가">상가</option>
                  <option value="토지">토지</option>
                  <option value="오피스텔">오피스텔</option>
                  <option value="힐스테이트더운정">힐스테이트더운정</option>
                  <option value="단독주택">단독주택</option>
                </select>
              </div>
              <div>
                <label style="font-size:12px;color:#666;display:block;margin-bottom:4px;">거래유형</label>
                <select id="editDeal">
                  <option value="매매">매매</option>
                  <option value="임대">임대</option>
                  <option value="전세">전세</option>
                  <option value="월세">월세</option>
                </select>
              </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
              <div>
                <label style="font-size:12px;color:#666;display:block;margin-bottom:4px;">가격(만원)</label>
                <input type="number" id="editPrice" placeholder="가격" min="0" />
              </div>
              <div>
                <label style="font-size:12px;color:#666;display:block;margin-bottom:4px;">면적(㎡)</label>
                <input type="number" id="editArea" placeholder="면적" min="0" step="0.1" />
              </div>
            </div>
            <div>
              <label style="font-size:12px;color:#666;display:block;margin-bottom:4px;">위치</label>
              <input type="text" id="editAddress" placeholder="표시용 주소" />
            </div>
            <div>
              <label style="font-size:12px;color:#666;display:block;margin-bottom:4px;">설명</label>
              <textarea id="editDesc" rows="3" placeholder="매물 설명"></textarea>
            </div>
            <div>
              <label style="font-size:12px;color:#666;display:block;margin-bottom:4px;">대표 이미지 URL</label>
              <input type="url" id="editImageUrl" placeholder="https://..." />
            </div>
            <div style="display:flex;gap:10px;margin-top:6px;">
              <button type="submit" class="btn btn-primary" style="flex:1;">저장</button>
              <button type="button" id="editCancelBtn" class="btn btn-outline" style="flex:1;">취소</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p class="footer-main">
          <strong>하이탑부동산공인중개사사무소</strong>
          <span>대표: 주현희</span>

        </p>
        <p class="footer-sub">
          <span>중개사무소 등록번호: 41480-2016-00026</span>

        </p>
        <p class="footer-links">
          <a href="https://blog.naver.com/newpajucity" target="_blank" rel="noopener noreferrer">블로그</a>

          <a href="https://www.youtube.com/@hitop_ai" target="_blank" rel="noopener noreferrer">유튜브</a>
        </p>
      </div>
    </footer>
    <script src="app.js?v=20260522a"></script>
  </body>
</html>
