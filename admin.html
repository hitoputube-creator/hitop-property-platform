<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>하이탑부동산 | 관리자 매물등록</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .admin-field-group { display: contents; }
      .price-field-group { display: contents; }
      .field-section-title {
        grid-column: 1/-1; font-size: 12px; font-weight: 700;
        color: #12335a; background: #f0f4f8; padding: 6px 10px;
        border-radius: 6px; margin-top: 4px;
      }
    </style>
  </head>
  <body data-page="admin">
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="index.html">
          <img src="images/hitoplogo.png" alt="" class="brand-logo" />
        </a>
        <button class="nav-toggle" aria-label="메뉴 열기">☰</button>
        <nav class="nav-menu">
          <a href="index.html">홈</a>
          <a href="listings.html">매물보기</a>
          <a href="index.html#contact">고객센터</a>
          <a href="admin.html" aria-current="page">관리자</a>
          <button class="btn btn-outline" id="logoutBtn" type="button" style="font-size:0.85rem;padding:6px 12px;display:none;">로그아웃</button>
        </nav>
      </div>
    </header>

    <div id="loginOverlay" class="login-overlay">
      <div class="login-box">
        <h2>관리자 로그인</h2>
        <input type="password" id="loginPw" placeholder="비밀번호 입력" autocomplete="current-password" />
        <p id="loginError" class="login-error hidden">비밀번호가 올바르지 않습니다.</p>
        <button class="btn btn-primary" id="loginBtn" type="button">로그인</button>
      </div>
    </div>

    <main class="section hidden" id="adminMain">
      <div class="container admin-grid">
        <section>
          <h1>매물 등록/수정</h1>
          <form id="adminForm" class="admin-form">
            <input type="hidden" name="id" />

            <!-- 기본 공통 필드 -->
            <div class="field-section-title">기본 정보</div>
            <select name="propertyType" required>
              <option value="">매물종류 선택</option>
              <option>공장창고</option>
              <option>상가</option>
              <option>오피스텔</option>
              <option>토지</option>
              <option>힐스테이트더운정</option>
              <option>단독주택전원주택</option>
            </select>
            <select name="dealType" required>
              <option value="">거래유형 선택</option>
              <option>매매</option>
              <option>임대</option>
              <option>전세</option>
              <option>월세</option>
            </select>
            <input name="title" placeholder="매물 제목" required />
            <input name="address" placeholder="정확한 주소 (지도 마커용 - 비공개)" required />
            <input name="displayAddress" placeholder="표시용 주소 (예: 파주시 탄현면)" required />
            <input type="number" name="area" min="0" placeholder="대표 면적(㎡)" required />

            <!-- 가격 필드 -->
            <div class="field-section-title">가격 정보</div>
            <div class="price-field-group" data-deals="매매">
              <input type="number" name="salePrice" min="0" placeholder="매매가 (만원)" />
            </div>
            <div class="price-field-group" data-deals="임대,월세">
              <input type="number" name="deposit" min="0" placeholder="보증금 (만원)" />
              <input type="number" name="monthlyRent" min="0" placeholder="월세 (만원)" />
              <input name="managementFee" placeholder="관리비 (예: 15만원, 없음)" />
            </div>
            <div class="price-field-group" data-deals="전세">
              <input type="number" name="deposit" min="0" placeholder="보증금 (만원)" />
            </div>

            <!-- 공장창고 전용 -->
            <div class="admin-field-group" data-types="공장창고">
              <div class="field-section-title">공장/창고 상세</div>
              <input type="number" name="landArea" min="0" placeholder="대지면적 (㎡)" />
              <input type="number" name="buildingArea" min="0" placeholder="건축면적 (㎡)" />
              <input type="number" name="totalArea" min="0" placeholder="연면적 (㎡)" />
              <input name="floor" placeholder="층정보 (예: 지상1층/총1층)" />
              <input name="direction" placeholder="방향 (예: 남향)" />
              <input name="mainUse" placeholder="주용도 (예: 창고시설)" />
              <input name="office" placeholder="사무실/화장실 (예: 1개/1개)" />
              <input name="parking" placeholder="주차 (예: 가능 5대)" />
              <input name="elevator" placeholder="엘리베이터 (예: 없음, 화물1대)" />
              <input name="approvalDate" placeholder="사용승인일 (예: 2010-03-15)" />
            </div>

            <!-- 상가 전용 -->
            <div class="admin-field-group" data-types="상가">
              <div class="field-section-title">상가 상세</div>
              <input type="number" name="contractArea" min="0" placeholder="계약면적 (㎡)" />
              <input type="number" name="exclusiveArea" min="0" placeholder="전용면적 (㎡)" />
              <input name="floor" placeholder="해당층/총층 (예: 1층/5층)" />
              <input name="moveInDate" placeholder="입주가능일 (예: 즉시입주)" />
              <input name="direction" placeholder="방향 (예: 남향)" />
              <input name="currentBusiness" placeholder="현재업종" />
              <input name="recommendBusiness" placeholder="추천업종" />
              <input name="parking" placeholder="주차" />
              <input name="heating" placeholder="난방 (예: 개별난방)" />
              <input name="buildingUse" placeholder="건축물용도 (예: 근린생활시설)" />
              <input name="approvalDate" placeholder="사용승인일" />
            </div>

            <!-- 오피스텔 전용 -->
            <div class="admin-field-group" data-types="오피스텔">
              <div class="field-section-title">오피스텔 상세</div>
              <input type="number" name="contractArea" min="0" placeholder="계약면적 (㎡)" />
              <input type="number" name="exclusiveArea" min="0" placeholder="전용면적 (㎡)" />
              <input name="floor" placeholder="해당층/총층 (예: 15층/25층)" />
              <input name="rooms" placeholder="방수/욕실수 (예: 1/1)" />
              <input name="direction" placeholder="방향 (예: 동향)" />
              <input name="heating" placeholder="난방 (예: 개별난방)" />
              <input name="moveInDate" placeholder="입주가능일" />
              <input name="parking" placeholder="주차" />
              <input name="buildingUse" placeholder="건축물용도" />
            </div>

            <!-- 토지 전용 -->
            <div class="admin-field-group" data-types="토지">
              <div class="field-section-title">토지 상세</div>
              <input type="number" name="landArea" min="0" placeholder="대지면적 (㎡)" />
              <input name="zoningArea" placeholder="용도지역 (예: 중심상업지역)" />
              <input name="currentUse" placeholder="현재용도" />
              <input name="recommendedUse" placeholder="추천용도" />
              <input name="landUse" placeholder="국토이용" />
              <input name="urbanPlanning" placeholder="도시계획" />
              <input name="buildingPermit" placeholder="건축허가 (예: 있음)" />
              <input name="landTransactionPermit" placeholder="토지거래허가" />
              <input name="accessRoad" placeholder="진입도로 (예: 있음)" />
            </div>

            <!-- 힐스테이트더운정 전용 -->
            <div class="admin-field-group" data-types="힐스테이트더운정">
              <div class="field-section-title">힐스테이트더운정 상세</div>
              <select name="subType">
                <option value="">구분 선택</option>
                <option>아파트</option>
                <option>오피스텔</option>
              </select>
              <input type="number" name="contractArea" min="0" placeholder="계약면적 (㎡)" />
              <input type="number" name="exclusiveArea" min="0" placeholder="전용면적 (㎡)" />
              <input name="floor" placeholder="해당층/총층" />
              <input name="rooms" placeholder="방수/욕실수" />
              <input name="direction" placeholder="방향" />
              <input name="heating" placeholder="난방" />
              <input name="moveInDate" placeholder="입주가능일" />
              <input name="parking" placeholder="주차" />
            </div>

            <!-- 단독주택/전원주택 전용 -->
            <div class="admin-field-group" data-types="단독주택전원주택">
              <div class="field-section-title">단독주택/전원주택 상세</div>
              <input type="number" name="landArea" min="0" placeholder="대지면적 (㎡)" />
              <input type="number" name="buildingArea" min="0" placeholder="건축면적 (㎡)" />
              <input name="floor" placeholder="층수 (예: 지상2층)" />
              <input name="rooms" placeholder="방수/욕실수 (예: 3/2)" />
              <input name="parking" placeholder="주차" />
              <input name="heating" placeholder="난방" />
              <input name="buildYear" placeholder="준공년도 (예: 2015)" />
              <input name="moveInDate" placeholder="입주가능일" />
            </div>

            <!-- 공통 하단 -->
            <div class="field-section-title">사진 및 설명</div>
            <textarea name="description" rows="4" placeholder="매물 설명 (줄바꿈 가능)"></textarea>
            <div id="imageUrlContainer"></div>
            <button type="button" id="addImageBtn" class="btn btn-outline" style="font-size:0.85rem;">사진 추가 +</button>
            <button type="submit" class="btn btn-primary">저장</button>
          </form>
        </section>

        <section>
          <h2>저장된 매물</h2>
          <div id="adminListings" class="admin-list"></div>
        </section>
      </div>
    </main>

    <footer class="site-footer compact-footer">
      <div class="container footer-inner">
        <p class="footer-main">
          <strong>하이탑부동산공인중개사사무소</strong>
          <span>대표: 주현희</span>
          <span>전화: 031-949-8969</span>
        </p>
        <p class="footer-sub">
          <span>Copyright © 2026 하이탑부동산. All rights reserved.</span>
        </p>
      </div>
    </footer>
    <script src="app.js"></script>
  </body>
</html>
